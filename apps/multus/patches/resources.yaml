apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-multus-ds
  namespace: kube-system
spec:
  template:
    spec:
      containers:
        - name: kube-multus
          resources:
            limits:
              cpu: 300m
              memory: 150Mi
            requests:
              cpu: 200m
              memory: 100Mi
